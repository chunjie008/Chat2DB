# Build Windows Electron App + GitHub Release
name: Build Windows

on:
  push:
    tags:
      - v*
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Check out git repository
        uses: actions/checkout@main

      - name: Extract version from tag
        id: version
        uses: bhowell2/github-substring-action@1.0.1
        with:
          value: ${{ github.ref }}
          index_of_str: "refs/tags/v"

      - name: Print version info
        run: |
          echo "version: ${{ steps.version.outputs.substring }}"

      # --- JRE for bundling ---
      - name: Install JRE 17
        uses: actions/setup-java@main
        with:
          java-version: "17"
          distribution: "temurin"
          java-package: "jre"

      - name: Enable TLSv1
        shell: pwsh
        run: |
          $filePath = "${{ env.JAVA_HOME }}\conf\security\java.security"
          $content = Get-Content $filePath -Raw
          $updatedContent = $content -replace '^(jdk.tls.disabledAlgorithms=)(.*)( TLSv1, TLSv1.1,)(.*)', '$1$2$4'
          $updatedContent | Set-Content $filePath

      - name: Copy JRE into static
        run: |
          mkdir chat2db-client/static
          cp -r "${{ env.JAVA_HOME }}" chat2db-client/static/jre

      # --- Node + Yarn ---
      - name: Install Node.js 16
        uses: actions/setup-node@main
        with:
          node-version: 16
          cache: "yarn"
          cache-dependency-path: chat2db-client/yarn.lock

      - name: Yarn install & build web (prod)
        run: |
          cd chat2db-client
          yarn
          yarn run build:web:prod --app_version=${{ steps.version.outputs.substring }}
          cp -r dist ../chat2db-server/chat2db-server-start/src/main/resources/static/front
          cp -r dist/index.html ../chat2db-server/chat2db-server-start/src/main/resources/thymeleaf/

      - name: Build Electron main process
        run: |
          cd chat2db-client/src/main
          yarn
          yarn run build

      # --- Java / Maven ---
      - name: Install Java & Maven
        uses: actions/setup-java@main
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "maven"

      - name: Build Java backend
        run: mvn clean package -B '-Dmaven.test.skip=true' -f chat2db-server/pom.xml

      # --- Prepare versions dir ---
      - name: Prepare versions directory
        run: |
          cd chat2db-client
          mkdir versions
          mkdir versions/${{ steps.version.outputs.substring }}
          mkdir versions/${{ steps.version.outputs.substring }}/static
          echo -n ${{ steps.version.outputs.substring }} > version
          cp -r version ./versions/

      - name: Copy backend JAR
        run: |
          cp chat2db-server/chat2db-server-start/target/chat2db-server-start.jar chat2db-client/versions/${{ steps.version.outputs.substring }}/static/

      - name: Build desktop frontend
        run: |
          cd chat2db-client
          yarn run build:web:desktop --app_version=${{ steps.version.outputs.substring }}
          cp -r dist ./versions/${{ steps.version.outputs.substring }}/
          rm -r dist

      # --- Electron package ---
      - name: Package Electron app for Windows
        uses: samuelmeuli/action-electron-builder@v1
        with:
          package_root: "chat2db-client/"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          skip_build: true
          args: "-c.extraMetadata.version=${{ steps.version.outputs.substring }} --win --x64"
          release: true
