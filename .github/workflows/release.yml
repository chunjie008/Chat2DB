# Build Windows Electron App + GitHub Release
name: Build Windows

on:
  push:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 0.3.8)'
        required: false
        default: '0.0.0'

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Check out git repository
        uses: actions/checkout@main

      - name: Extract version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="${{ inputs.version }}"
          fi
          VERSION="${VERSION#v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version: $VERSION"

      - name: Install JRE 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          java-package: "jre"

      - name: Enable TLSv1
        shell: pwsh
        run: |
          $filePath = "${{ env.JAVA_HOME }}\conf\security\java.security"
          $content = Get-Content $filePath -Raw
          $updatedContent = $content -replace '^(jdk.tls.disabledAlgorithms=)(.*)( TLSv1, TLSv1.1,)(.*)', '$1$2$4'
          $updatedContent | Set-Content $filePath

      - name: Copy JRE
        run: |
          mkdir chat2db-client/static
          cp -r "${{ env.JAVA_HOME }}" chat2db-client/static/jre

      - name: Install Node.js 16
        uses: actions/setup-node@v4
        with:
          node-version: 16
          cache: "yarn"
          cache-dependency-path: chat2db-client/yarn.lock

      - name: Yarn install & build web (prod)
        run: |
          cd chat2db-client
          yarn
          yarn run build:web:prod --app_version=${{ env.VERSION }}
          cp -r dist ../chat2db-server/chat2db-server-start/src/main/resources/static/front
          cp -r dist/index.html ../chat2db-server/chat2db-server-start/src/main/resources/thymeleaf/

      - name: Build Electron main process
        run: |
          cd chat2db-client/src/main
          yarn
          yarn run build

      - name: Install Java & Maven
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "maven"

      - name: Build Java backend
        run: mvn clean package -B '-Dmaven.test.skip=true' -f chat2db-server/pom.xml

      - name: Prepare versions
        run: |
          cd chat2db-client
          mkdir versions
          mkdir versions/${{ env.VERSION }}
          mkdir versions/${{ env.VERSION }}/static
          echo -n ${{ env.VERSION }} > version
          cp -r version ./versions/

      - name: Copy backend JAR
        run: cp chat2db-server/chat2db-server-start/target/chat2db-server-start.jar chat2db-client/versions/${{ env.VERSION }}/static/

      - name: Build desktop frontend
        run: |
          cd chat2db-client
          yarn run build:web:desktop --app_version=${{ env.VERSION }}
          cp -r dist ./versions/${{ env.VERSION }}/
          rm -r dist

      - name: Package Electron for Windows
        uses: samuelmeuli/action-electron-builder@v1
        with:
          package_root: "chat2db-client/"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          skip_build: true
          args: "-c.extraMetadata.version=${{ env.VERSION }} --win --x64"
          release: true
